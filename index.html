<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>O Poderoso Miguel — 1 Ano | Confirme sua presença</title>
<meta name="description" content="O chefe completa 1 ano. Confirme sua presença.">
<meta property="og:title" content="O Poderoso Miguel — 1 Ano">
<meta property="og:description" content="15 de agosto · Vivace Eventos · Confirme sua presença">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Barlow:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ============================================================
   TOKENS
   ============================================================ */
:root{
  --preto:#1F1F1F;
  --cinza-escuro:#333333;
  --branco:#FFFFFF;
  --azul-principal:#4A90E2;
  --azul-claro:#DDEEFF;
  --dourado:#D4AF37;
  --cinza-claro:#F5F5F5;

  --linha:rgba(31,31,31,.14);

  --display:'Archivo Black', system-ui, sans-serif;
  --body:'Barlow', system-ui, sans-serif;
  --mono:'IBM Plex Mono', ui-monospace, monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:var(--body);
  color:var(--preto);
  background-color:var(--azul-claro);
  background-image:
    repeating-linear-gradient(90deg, rgba(74,144,226,.10) 0 1px, transparent 1px 44px),
    repeating-linear-gradient(0deg, rgba(74,144,226,.10) 0 1px, transparent 1px 44px);
  -webkit-font-smoothing:antialiased;
  line-height:1.55;
}
.wrap{max-width:540px;margin:0 auto;padding:0 16px 56px}

/* ============================================================
   CRACHÁ
   ============================================================ */
.clip{width:54px;height:14px;margin:0 auto;border-radius:4px;background:var(--cinza-escuro);border:2px solid var(--preto)}
.lanyard{width:2px;height:30px;margin:0 auto;background:var(--preto)}
.badge{
  background:var(--branco);border:2px solid var(--preto);border-radius:14px;
  margin-top:-2px;overflow:hidden;
  box-shadow:0 24px 44px -26px rgba(31,31,31,.75);
}
.badge-top{
  background:var(--preto);color:var(--branco);
  padding:10px 16px;display:flex;justify-content:space-between;align-items:center;
  font-family:var(--mono);font-size:10px;letter-spacing:.18em;text-transform:uppercase;
}
.badge-top .gold{color:var(--dourado)}
.badge-body{padding:22px 18px 24px;text-align:center}

.logo{width:100%;max-width:400px;height:auto;display:block;margin:0 auto}

.chefe{
  position:relative;margin:6px auto 0;width:100%;max-width:330px;
}
.chefe::before{
  content:"";position:absolute;left:50%;bottom:6%;transform:translateX(-50%);
  width:82%;padding-top:82%;border-radius:50%;
  background:radial-gradient(circle, var(--azul-claro) 0%, rgba(221,238,255,0) 68%);
  z-index:0;
}
.chefe img{position:relative;z-index:1;width:100%;height:auto;display:block}

.role{
  font-family:var(--mono);font-size:11px;letter-spacing:.22em;text-transform:uppercase;
  color:var(--azul-principal);margin-top:14px;
}
.rule{height:2px;background:var(--dourado);width:64px;margin:14px auto}
.years{font-weight:600;font-size:15px;color:var(--cinza-escuro)}
.badge-foot{
  border-top:2px dashed var(--linha);padding:12px 16px;
  display:flex;justify-content:space-between;
  font-family:var(--mono);font-size:10px;color:var(--cinza-escuro);
  letter-spacing:.1em;text-transform:uppercase;
}
.badge-foot b{color:var(--preto)}

/* ============================================================
   CARDS
   ============================================================ */
.card{
  background:var(--branco);border:2px solid var(--preto);border-radius:14px;
  margin-top:18px;overflow:hidden;
  box-shadow:0 20px 40px -30px rgba(31,31,31,.7);
}
.card-head{
  background:var(--cinza-claro);border-bottom:2px solid var(--preto);
  padding:12px 18px;display:flex;align-items:center;gap:10px;
}
.card-head h2{font-family:var(--mono);font-weight:600;font-size:12px;letter-spacing:.2em;text-transform:uppercase}
.card-head .dot{width:9px;height:9px;border-radius:50%;background:var(--dourado);flex:none}
.card-in{padding:20px 18px 24px}
.sub{color:var(--cinza-escuro);font-size:14px;margin-bottom:18px}

.facts{display:grid}
.fact{display:flex;gap:14px;padding:13px 0;border-bottom:1px solid var(--linha)}
.fact:last-child{border-bottom:0}
.fact .k{
  font-family:var(--mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;
  color:var(--azul-principal);width:66px;flex:none;padding-top:4px;
}
.fact .v{font-weight:600;font-size:16px}
.fact .v small{display:block;font-weight:400;color:var(--cinza-escuro);font-size:13px;margin-top:2px}
.maps{
  display:inline-block;margin-top:14px;font-family:var(--mono);font-size:11px;
  letter-spacing:.12em;text-transform:uppercase;color:var(--preto);text-decoration:none;
  border-bottom:2px solid var(--dourado);padding-bottom:3px;
}
.maps:hover{color:var(--azul-principal)}
.countdown{
  display:flex;justify-content:center;gap:8px;align-items:baseline;
  background:var(--preto);color:var(--branco);border-radius:10px;
  padding:12px;margin-top:18px;font-family:var(--mono);font-size:11px;
  letter-spacing:.16em;text-transform:uppercase;
}
.countdown b{font-family:var(--display);font-size:20px;color:var(--dourado);letter-spacing:0}

/* ============================================================
   FORM
   ============================================================ */
label{display:block;font-weight:700;font-size:14px;margin:18px 0 6px}
label small{display:block;font-weight:400;color:var(--cinza-escuro);font-size:12px;margin-top:2px}
input[type=text],input[type=tel],select,textarea{
  width:100%;font-family:var(--body);font-size:16px;color:var(--preto);
  background:var(--cinza-claro);border:2px solid var(--linha);border-radius:10px;
  padding:13px 14px;transition:border-color .15s, box-shadow .15s, background .15s;
}
textarea{resize:vertical;min-height:88px}
input:focus,select:focus,textarea:focus{
  outline:none;border-color:var(--azul-principal);background:var(--branco);
  box-shadow:0 0 0 4px rgba(74,144,226,.2);
}
.choice{display:grid;gap:10px}
.choice input{position:absolute;opacity:0;width:1px;height:1px}
.choice > label{
  margin:0;display:flex;align-items:center;gap:12px;cursor:pointer;font-weight:600;
  border:2px solid var(--linha);border-radius:10px;padding:14px;background:var(--cinza-claro);
  transition:border-color .15s, background .15s;
}
.choice > label::before{
  content:"";width:18px;height:18px;border-radius:4px;flex:none;
  border:2px solid var(--cinza-escuro);transition:.15s;
}
.choice input:checked + label{border-color:var(--azul-principal);background:var(--azul-claro)}
.choice input:checked + label::before{
  border-color:var(--azul-principal);background:var(--azul-principal);
  box-shadow:inset 0 0 0 3px var(--branco);
}
.choice input:focus-visible + label{box-shadow:0 0 0 4px rgba(74,144,226,.2)}
.hidden{display:none}

/* ---- lista de convidados ---- */
.guest{
  border:2px solid var(--linha);border-left:5px solid var(--azul-principal);
  border-radius:10px;padding:14px;margin-top:12px;background:var(--branco);
  animation:slide .22s ease-out both;
}
@keyframes slide{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}
.guest.ok{border-left-color:var(--dourado)}
.guest-h{
  font-family:var(--mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;
  color:var(--cinza-escuro);margin-bottom:8px;display:flex;justify-content:space-between;
}
.guest input[type=text],.guest select{background:var(--cinza-claro)}
.seg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.seg input{position:absolute;opacity:0;width:1px;height:1px}
.seg label{
  margin:0;text-align:center;font-size:13px;font-weight:600;cursor:pointer;
  border:2px solid var(--linha);border-radius:8px;padding:10px;background:var(--cinza-claro);
  transition:.15s;
}
.seg input:checked + label{background:var(--preto);color:var(--branco);border-color:var(--preto)}
.seg input:focus-visible + label{box-shadow:0 0 0 4px rgba(74,144,226,.2)}
.guest .idade{margin-top:10px}
.guest .idade label{margin:0 0 6px}

.gate{
  margin-top:14px;padding:12px 14px;border-radius:10px;
  background:var(--azul-claro);border:2px dashed var(--azul-principal);
  font-size:13px;font-weight:600;color:var(--cinza-escuro);text-align:center;
}
button.go{
  width:100%;margin-top:20px;padding:17px;border:2px solid var(--preto);border-radius:10px;
  cursor:pointer;background:var(--preto);color:var(--branco);
  font-family:var(--display);font-size:17px;
  transition:transform .12s, background .15s, color .15s, opacity .15s;
}
button.go:hover:not(:disabled){background:var(--dourado);color:var(--preto)}
button.go:active:not(:disabled){transform:scale(.985)}
button.go:disabled{opacity:.4;cursor:not-allowed;background:var(--cinza-escuro);border-color:var(--cinza-escuro)}
button.go:focus-visible{outline:3px solid var(--azul-principal);outline-offset:3px}
.err{color:#C0392B;font-size:13px;margin-top:12px;text-align:center;font-weight:600}

/* ============================================================
   CONFIRMADO
   ============================================================ */
.done .card-in{text-align:center;padding:34px 20px}
.stamp{
  display:inline-block;border:3px solid var(--dourado);color:var(--dourado);
  font-family:var(--display);font-size:15px;letter-spacing:.14em;
  padding:10px 18px;border-radius:8px;transform:rotate(-6deg);
  animation:stamp .4s cubic-bezier(.2,1.4,.4,1) both;
}
@keyframes stamp{from{transform:rotate(-6deg) scale(1.8);opacity:0}to{transform:rotate(-6deg) scale(1);opacity:1}}
.done h3{font-family:var(--display);font-size:24px;margin:18px 0 8px}
.done p{color:var(--cinza-escuro);font-size:15px}
.lista{
  margin-top:18px;text-align:left;background:var(--cinza-claro);
  border-radius:10px;padding:14px;font-size:14px;
}
.lista .t{
  font-family:var(--mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;
  color:var(--cinza-escuro);margin-bottom:8px;
}
.lista li{list-style:none;padding:5px 0;border-bottom:1px solid var(--linha);display:flex;justify-content:space-between}
.lista li:last-child{border-bottom:0}
.lista li span{color:var(--cinza-escuro);font-family:var(--mono);font-size:12px}
.tally{
  margin-top:20px;padding-top:16px;border-top:1px solid var(--linha);
  font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--cinza-escuro);
}
.tally b{font-family:var(--display);font-size:20px;color:var(--azul-principal);letter-spacing:0}
.again{
  margin-top:18px;background:none;border:0;font-family:var(--mono);font-size:11px;
  color:var(--cinza-escuro);text-decoration:underline;cursor:pointer;
}
footer{
  text-align:center;margin-top:26px;font-family:var(--mono);font-size:10px;
  letter-spacing:.14em;text-transform:uppercase;color:var(--cinza-escuro);
}
footer a{color:var(--preto);font-weight:600}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}html{scroll-behavior:auto}}
</style>
</head>

    <div class="seg">
      <input type="radio" id="t${i}a" name="tipo${i}" value="adulto">
      <label for="t${i}a">Adulto</label>
      <input type="radio" id="t${i}c" name="tipo${i}" value="crianca">
      <label for="t${i}c">Criança</label>
    </div>
    <div class="idade hidden">
      <label for="id${i}">Idade da criança</label>
      <select id="id${i}" class="g-idade">
        <option value="">Selecione a idade...</option>
        <option value="0">Menos de 1 ano</option>
        ${Array.from({length:12}, (_,k) => `<option value="${k+1}">${k+1} ano${k?'s':''}</option>`).join('')}
        <option value="13+">13 anos ou mais</option>
      </select>
    </div>`;
  return d;
}

$('qtd').addEventListener('change', () => {
  const n = parseInt($('qtd').value);
  box.innerHTML = '';
  if (!isNaN(n)) for (let i = 1; i <= n; i++) box.appendChild(cardConvidado(i));
  validar();
});

// delegação: mostra/esconde idade e revalida a cada digitação
box.addEventListener('input', validar);
box.addEventListener('change', e => {
  if (e.target.type === 'radio') {
    const g = e.target.closest('.guest');
    g.querySelector('.idade').classList.toggle('hidden', e.target.value !== 'crianca');
    if (e.target.value !== 'crianca') g.querySelector('.g-idade').value = '';
  }
  validar();
});

document.querySelectorAll('input[name=presenca]').forEach(r => {
  r.addEventListener('change', () => {
    const vai = r.value === 'sim' && r.checked;
    $('blocoSim').classList.toggle('hidden', !vai);
    if (!vai) { $('qtd').value = ''; box.innerHTML = ''; }
    validar();
  });
});
$('nome').addEventListener('input', validar);
$('fone').addEventListener('input', validar);

/* ---- a trava: só libera o botão com tudo preenchido ---- */
function coletarConvidados(){
  return [...box.querySelectorAll('.guest')].map(g => {
    const tipo = g.querySelector('input[type=radio]:checked');
    return {
      el   : g,
      nome : g.querySelector('.g-nome').value.trim(),
      tipo : tipo ? tipo.value : '',
      idade: g.querySelector('.g-idade').value,
    };
  });
}

function validar(){
  const gate = $('gate'), btn = $('btn');
  const nome = $('nome').value.trim();
  const fone = $('fone').value.replace(/\D/g,'');
  const presenca = document.querySelector('input[name=presenca]:checked');

  let falta = '';
  if (!nome)              falta = 'Preencha seu nome para continuar.';
  else if (fone.length < 10) falta = 'Preencha um WhatsApp válido (com DDD).';
  else if (!presenca)     falta = 'Diga se você vem à festa.';
  else if (presenca.value === 'sim') {
    if ($('qtd').value === '') falta = 'Escolha quantos convidados vêm com você.';
    else {
      const gs = coletarConvidados();
      gs.forEach(g => {
        const ok = g.nome && g.tipo && (g.tipo === 'adulto' || g.idade !== '');
        g.el.classList.toggle('ok', !!ok);
        g.el.querySelector('.st').textContent = ok ? '✓ ok' : '—';
      });
      const semNome  = gs.find(g => !g.nome);
      const semTipo  = gs.find(g => g.nome && !g.tipo);
      const semIdade = gs.find(g => g.tipo === 'crianca' && g.idade === '');
      if (semNome)       falta = `Falta o nome do convidado ${semNome.el.dataset.i}.`;
      else if (semTipo)  falta = `Diga se o convidado ${semTipo.el.dataset.i} é adulto ou criança.`;
      else if (semIdade) falta = `Falta a idade da criança (convidado ${semIdade.el.dataset.i}).`;
    }
  }

  if (falta) { gate.textContent = falta; gate.classList.remove('hidden'); btn.disabled = true; }
  else       { gate.classList.add('hidden'); btn.disabled = false; }
}
validar();

/* ============================================================
   FIREBASE + ENVIO
   ============================================================ */
let db = null;
try { firebase.initializeApp(firebaseConfig); db = firebase.database(); }
catch (e) { console.error('Firebase não iniciou:', e); }

const form = $('rsvp'), btn = $('btn'), err = $('err');

form.addEventListener('submit', async e => {
  e.preventDefault();
  err.classList.add('hidden');
  validar();
  if (btn.disabled) return;

  if (!db) {
    err.textContent = 'Sem conexão com o servidor. Tente de novo em instantes.';
    err.classList.remove('hidden');
    return;
  }

  const vai = document.querySelector('input[name=presenca]:checked').value === 'sim';
  const gs  = vai ? coletarConvidados().map(g => ({nome:g.nome, tipo:g.tipo, idade:g.tipo === 'crianca' ? g.idade : ''})) : [];

  const dados = {
    nome      : $('nome').value.trim(),
    whatsapp  : $('fone').value.trim(),
    vai       : vai,
    convidados: gs,
    totalPessoas: vai ? gs.length + 1 : 0,
    totalAdultos: vai ? gs.filter(g => g.tipo === 'adulto').length + 1 : 0,
    totalCriancas: vai ? gs.filter(g => g.tipo === 'crianca').length : 0,
    idadesCriancas: gs.filter(g => g.tipo === 'crianca').map(g => g.idade),
    recado    : $('recado').value.trim(),
    enviadoEm : new Date().toISOString(),
  };

  btn.disabled = true;
  btn.textContent = 'ENVIANDO...';

  try {
    const idAntigo = localStorage.getItem(LS_KEY);
    const ref = idAntigo ? db.ref(`${DB_PATH}/${idAntigo}`) : db.ref(DB_PATH).push();
    await ref.set(dados);
    localStorage.setItem(LS_KEY, ref.key);
    mostrarConfirmado(dados);
  } catch (e2) {
    console.error(e2);
    btn.disabled = false;
    btn.textContent = 'ASSINAR CONFIRMAÇÃO';
    err.textContent = 'Não deu para enviar. Verifique a internet e tente de novo.';
    err.classList.remove('hidden');
  }
});

function mostrarConfirmado(d){
  $('formCard').classList.add('hidden');
  $('doneCard').classList.remove('hidden');
  $('stamp').textContent     = d.vai ? 'APROVADO' : 'REGISTRADO';
  $('doneTitle').textContent = d.vai ? 'Presença confirmada' : 'Ausência registrada';
  $('doneText').textContent  = d.vai
    ? `${d.nome}, o Miguel espera você e sua equipe dia 15 de agosto no Vivace Eventos.`
    : `Obrigado por avisar, ${d.nome}. O chefe vai sentir sua falta.`;

  const lista = $('lista');
  if (d.vai) {
    lista.classList.remove('hidden');
    lista.innerHTML = `<p class="t">Equipe confirmada (${d.totalPessoas})</p><ul>
      <li>${d.nome}<span>você</span></li>
      ${d.convidados.map(g => `<li>${g.nome}<span>${g.tipo === 'crianca' ? (g.idade === '0' ? 'menos de 1 ano' : g.idade + ' anos') : 'adulto'}</span></li>`).join('')}
    </ul>`;
  } else {
    lista.classList.add('hidden');
  }

  $('doneCard').scrollIntoView({block:'center'});
  if (CONFIG.mostrarTotal) contarConvidados();
}

function contarConvidados(){
  db.ref(DB_PATH).once('value').then(snap => {
    let p = 0;
    snap.forEach(c => { const v = c.val(); if (v.vai) p += (v.totalPessoas || 0); });
    $('tally').innerHTML = `Equipe confirmada até agora: <b>${p}</b> pessoas`;
  }).catch(() => { $('tally').style.display = 'none'; });
}

$('again').addEventListener('click', () => {
  $('doneCard').classList.add('hidden');
  $('formCard').classList.remove('hidden');
  btn.textContent = 'ATUALIZAR MINHA RESPOSTA';
  validar();
  $('formCard').scrollIntoView({block:'center'});
});
</script>
</body>
</html>
